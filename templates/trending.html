<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Places</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Styles */
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f1f5f9; color: #1e293b; transition: 0.3s; }

        /* Navbar */
        .navbar { background: white; padding: 20px 8%; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 700; color: #1e3c72; display: flex; align-items: center; gap: 10px; }
        .logo span { color: #00b4db; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: #475569; text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: #00b4db; }

        /* Trending Container */
        .trending-container { padding: 50px 8%; }
        h1 { color: #1e3c72; text-align: center; margin-bottom: 40px; }

        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: #ffffff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .card h3 { color: #1e3c72; margin: 10px 0; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; opacity: 0; transition: opacity 0.3s ease; overflow-y: auto; }
        .modal.show { opacity: 1; }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 20px; text-align: center; position: relative; }
        .close { position: absolute; top: 15px; right: 25px; font-size: 30px; cursor: pointer; color: #333; }
        #modalImg { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        
        .modal-actions { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
    
        .btn-discover { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-discover:hover { transform: scale(1.05); box-shadow: 0 0 15px #38bdf8; }
        .btn-book { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; }
         .btn-rate { background: #64748b; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; }

         .footer { text-align: center; padding: 40px 30px; margin-top: 80px; border-top: 1px solid #e2e8f0; color: #94a3b8; font-size: 0.9rem; }
        .social-links { margin-top: 15px; }
        .social-links a { color: #00b4db; margin: 0 12px; font-size: 1.4rem; transition: 0.3s; }
        .social-links a:hover { color: #1e3c72; }
    </style>

</head>
<body>

<nav class="navbar">
    <div class="logo"><i class="fa-solid fa-compass"></i> Ceylon<span>Vibe</span></div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/explore">Explore</a></li>
        <li><a href="/trending">Trending Places</a></li>
        <li><a href="/planner" class="btn-nav-ai"> AI Planner</a></li>
    </ul>
</nav>

<div class="trending-container">
    <h1>Trending Places in Sri Lanka</h1>
    <div class="cards-grid">
    {% for place in destinations %}
        <div class="card">
            <img src="{{ url_for('static', filename='images/' + place.image_name) }}" alt="{{ place.name }}">
            <h3>{{ place.name }}</h3>
            <p>{{ place.description }}</p>
            
            <!-- මෙතන ምንም වෙනස් කරන්න එපා, දැන් බොත්තම ලස්සනට මැදට එයි -->
            <button class="btn-discover" 
                    data-name="{{ place.name }}" 
                    data-desc="{{ place.description }}" 
                    data-img="{{ url_for('static', filename='images/' + place.image_name) }}"
                    data-location="{{ place.location }}" 
                    data-rating="{{ place.rating }}"
                    onclick="openModal(this)">
                Discover More
            </button>
        </div>
    {% endfor %}
</div>

<!-- Modal -->
<div id="placeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="Place">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <div class="extra-info" style="margin: 15px 0;">
            <p><i class="fa-solid fa-location-dot"></i> <span id="modalLocation"></span></p>
            <p><i class="fa-solid fa-star"></i> Rating: <span id="modalRating"></span>/5</p>
        </div>
       <div class="modal-actions">
            <button class="btn-discover" style="width: auto;" onclick="goToBooking()">Book Now</button>
            <button class="btn-rate" onclick="goToRate()">Rate this</button>
        </div>
    </div>
</div>

<footer class="footer">
        <p>Ceylon Vibe © 2027 | Explore the beauty of Sri Lanka</p>
        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </footer>

<script>
    function openModal(btn) {
        const modal = document.getElementById("placeModal");
        document.getElementById("modalTitle").innerText = btn.getAttribute('data-name');
        document.getElementById("modalDesc").innerText = btn.getAttribute('data-desc');
        document.getElementById("modalImg").src = btn.getAttribute('data-img');
        document.getElementById("modalLocation").innerText = btn.getAttribute('data-location');
        document.getElementById("modalRating").innerText = btn.getAttribute('data-rating');
        
        modal.style.display = "block";
        setTimeout(() => { modal.classList.add('show'); }, 10);
    }

    function closeModal() {
        const modal = document.getElementById("placeModal");
        modal.classList.remove('show');
        setTimeout(() => { modal.style.display = "none"; }, 300);
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById("placeModal")) closeModal();
    }

    function goToBooking() {
        const placeName = document.getElementById("modalTitle").innerText;
        window.location.href = "/booking?place=" + encodeURIComponent(placeName);
    }

    function goToRate() {
        const placeName = document.getElementById("modalTitle").innerText;
        window.location.href = '/rate_place/' + encodeURIComponent(placeName);
    }
</script>

</body>
</html>
