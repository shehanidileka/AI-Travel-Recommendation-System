<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ceylon Vibe - Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: zoomEffect 15s ease infinite alternate;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes zoomEffect {
            0% { background-size: 100% 100%; }
            100% { background-size: 110% 110%; }
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            color: #000;
        }

        h2 { color: #000; margin-bottom: 10px; }
        p { color: #333; margin-bottom: 25px; font-size: 0.9em; }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            border-color: #1e3c72;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }

        button {
            width: 100%;
            background: #1e3c72;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00b4db;
            transform: translateY(-2px);
        }

        #error-message {
            background: rgba(255, 77, 77, 0.15);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ff4d4d;
            color: #d63031;
            margin-bottom: 20px;
            font-weight: 600;
            display: none; /* Flask එකෙන් එන error එක අනුව මේක පේනවා */
        }
    </style>
</head>
<body>

    <!-- ඉහත ඇති CSS සියල්ල එලෙසම තබා ගන්න -->

<div class="login-container">
    <h2>Admin Login</h2>
    <p>Enter your credentials to access the dashboard.</p>

    <!-- Error Message එක -->
    <div id="error-message">Invalid password! Please try again.</div>

    <!-- action එක ඉවත් කරා, අපි JavaScript හරහා පාලනය කරන්නේ -->
    <form id="loginForm">
        <input type="password" id="password" name="password" placeholder="Enter Admin Password" required>
        <button type="submit" id="loginBtn">Login</button>
    </form>
</div>

<script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', function(e) {
        e.preventDefault(); 
        
        const password = document.getElementById('password').value;

        // URL එක අතින්ම ලබා දෙන්න (මේක වැඩ කරනවා නම් ප්‍රශ්නයක් නැත)
        fetch('/login', { 
            method: 'POST',
            body: new URLSearchParams({ 'password': password }),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            if (data.status === 'success') {
                window.location.href = '/admin/feedbacks'; 
            } else {
                errorMessage.style.display = 'block';
                document.getElementById('password').value = '';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert("කරුණාකර සර්වර් එක සහ route එක පරීක්ෂා කරන්න.");
        });
    });
</script>
</body>
</html>
